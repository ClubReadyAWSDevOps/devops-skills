name: Monthly AWS Audit

on:
  schedule:
    # Run on 1st of every month at 9 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      account_ids:
        description: 'Comma-separated AWS Account IDs to audit (defaults to secrets.AWS_ACCOUNT_IDS)'
        required: false
        type: string

permissions:
  id-token: write  # Required for OIDC
  contents: read
  issues: write    # Create GitHub issue with findings

jobs:
  prepare-accounts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare account matrix
        id: set-matrix
        run: |
          # Get account IDs from input or variable
          ACCOUNT_IDS="${{ inputs.account_ids || vars.AWS_ACCOUNT_IDS }}"

          # Convert comma-separated string to JSON array
          # Example: "123456789012,234567890123" -> ["123456789012","234567890123"]
          MATRIX=$(echo "$ACCOUNT_IDS" | jq -R -c 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$";""))')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Will audit accounts: $MATRIX"

  comprehensive-audit:
    needs: prepare-accounts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        account_id: ${{ fromJson(needs.prepare-accounts.outputs.matrix) }}
      fail-fast: false  # Continue auditing other accounts even if one fails
    env:
      AWS_REGION: us-west-2
      AWS_ACCOUNT_ID: ${{ matrix.account_id }}
      GITHUB_AUDIT_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq bc

          # Verify installations
          aws --version
          jq --version
          bc --version
          gh --version

      - name: Get account alias
        id: account-info
        run: |
          # Fetch account alias for issue title (before authentication)
          ACCOUNT_ALIAS=$(aws iam list-account-aliases --region us-west-2 --query 'AccountAliases[0]' --output text 2>/dev/null || echo "")
          if [ -z "$ACCOUNT_ALIAS" ] || [ "$ACCOUNT_ALIAS" = "None" ]; then
            ACCOUNT_ALIAS="Account-${{ matrix.account_id }}"
          fi
          echo "alias=$ACCOUNT_ALIAS" >> $GITHUB_OUTPUT
          echo "Account alias: $ACCOUNT_ALIAS"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-actions-claude-review
          aws-region: us-west-2
          role-session-name: github-actions-aws-audit-${{ matrix.account_id }}

      - name: Verify AWS access
        run: |
          echo "Testing AWS CLI access..."
          aws sts get-caller-identity --region us-west-2
          echo "✅ AWS authentication successful"

      - name: Run AWS Comprehensive Audit via Claude Code
        id: comprehensive-audit
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_ACCOUNT_ID: ${{ matrix.account_id }}
          AWS_ACCOUNT_ALIAS: ${{ steps.account-info.outputs.alias }}
        with:
          github_token: ${{ github.token }}
          use_bedrock: "true"
          track_progress: false # No PR to comment on — this is a scheduled audit
          prompt: |
            You are running the automated monthly AWS infrastructure audit for
            account ${{ matrix.account_id }} (alias: ${{ steps.account-info.outputs.alias }}).

            Use the project's own audit skills — do NOT invent your own checklist. The four
            sub-audit skills are checked out in .claude/skills/ and available via the Skill tool.

            CRITICAL EXECUTION MODEL — read carefully. You are running headless (no human, no
            interactive loop). Do NOT spawn background or parallel subagents (do NOT use the
            Agent or Task tools) and do NOT say you will "wait for results" — a background agent
            will never report back here and the run will end with no audit. Instead, run
            everything INLINE in THIS conversation, one step at a time, blocking on each.

            Do this in order:
            1. Invoke the Skill "aws-cost-review" and capture its full output.
            2. Invoke the Skill "aws-credentials-audit" and capture its full output.
            3. Invoke the Skill "aws-architecture-review" and capture its full output.
            4. Invoke the Skill "aws-reserved-capacity" and capture its full output.
               (Run them sequentially. Each skill's bash runs in your own context — wait for it
               to finish before starting the next. If one hits AccessDenied, record the missing
               permission and continue with the rest — partial results beat none.)
            5. Synthesize ALL findings into one prioritized report: an executive summary table
               with calculated Total Monthly Cost, Identified Waste, Savings Opportunity and an
               Architecture Score, then findings grouped P0/P1/P2/P3, then collapsible
               <details> sections with each sub-audit's raw output. Match the structure in
               .claude/skills/aws-comprehensive-audit/SKILL.md.
               KNOWN INTENTIONAL EXCEPTIONS — do NOT report these as findings at any priority:
               the ECS services api-ikizmet-com/api-ikizmet-com-r and
               api-ikizmet-com/api-ikizmet-com-b are deliberately scale-to-zero
               (minCapacity=0); exclude any "no auto-scaling floor" / "can disappear" finding
               about them.
            6. Write the report to /tmp/aws-audit-report.md, then UPDATE the single canonical
               issue for this account (one persistent issue per account, refreshed each round —
               do NOT create a new issue every run). The "account:${{ matrix.account_id }}"
               label is the stable key. Run exactly this find-or-create-or-reopen logic:

                 TITLE="AWS Audit: ${{ steps.account-info.outputs.alias }} (${{ matrix.account_id }}) — $(date -u +%F)"
                 EXISTING=$(gh issue list --repo ${{ github.repository }} \
                   --label "account:${{ matrix.account_id }}" --state all --limit 1 \
                   --json number --jq '.[0].number // empty')
                 if [ -n "$EXISTING" ]; then
                   gh issue reopen "$EXISTING" --repo ${{ github.repository }} 2>/dev/null || true
                   gh issue edit "$EXISTING" --repo ${{ github.repository }} \
                     --title "$TITLE" --body-file /tmp/aws-audit-report.md
                   gh issue comment "$EXISTING" --repo ${{ github.repository }} \
                     --body "🔄 Audit refreshed $(date -u +%F) (run ${{ github.run_id }}). Body above updated with the latest findings."
                   echo "Updated existing issue #$EXISTING"
                 else
                   gh issue create --repo ${{ github.repository }} --title "$TITLE" \
                     --body-file /tmp/aws-audit-report.md \
                     --label "aws-audit" --label "monthly-review" --label "automated" \
                     --label "account:${{ matrix.account_id }}"
                 fi

               Notes:
               - Reopen first so a previously-closed issue comes back for the new round.
               - The per-account title + "account:<id>" label are REQUIRED — they keep each
                 account's issue distinct in this matrix workflow.
               - Use --state all in the lookup so closed issues are found and reused, not
                 duplicated.

            All AWS data is for account ${{ matrix.account_id }} only — every aws CLI call must
            pass --region us-west-2. Finish by printing the issue URL (created or updated).
          claude_args: >-
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 80
            --allowedTools "Skill,Read,Write,Glob,Grep,Bash"

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aws-audit-transcript-${{ matrix.account_id }}-${{ github.run_number }}
          path: ${{ steps.comprehensive-audit.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::AWS Comprehensive Audit failed for account ${{ matrix.account_id }}. Check logs and transcript artifact."

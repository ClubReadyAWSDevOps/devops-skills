name: Monthly AWS Audit

on:
  schedule:
    # Run on 1st of every month at 9 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      account_ids:
        description: 'Comma-separated AWS Account IDs to audit (defaults to secrets.AWS_ACCOUNT_IDS)'
        required: false
        type: string

permissions:
  id-token: write  # Required for OIDC
  contents: read
  issues: write    # Create GitHub issue with findings

jobs:
  prepare-accounts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare account matrix
        id: set-matrix
        run: |
          # Get account IDs from input or variable
          ACCOUNT_IDS="${{ inputs.account_ids || vars.AWS_ACCOUNT_IDS }}"

          # Convert comma-separated string to JSON array
          # Example: "123456789012,234567890123" -> ["123456789012","234567890123"]
          MATRIX=$(echo "$ACCOUNT_IDS" | jq -R -c 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$";""))')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Will audit accounts: $MATRIX"

  comprehensive-audit:
    needs: prepare-accounts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        account_id: ${{ fromJson(needs.prepare-accounts.outputs.matrix) }}
      fail-fast: false  # Continue auditing other accounts even if one fails
      max-parallel: 3   # Limit concurrent audits
    env:
      AWS_REGION: us-west-2
      AWS_ACCOUNT_ID: ${{ matrix.account_id }}
      GITHUB_AUDIT_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq bc

          # Verify installations
          aws --version
          jq --version
          bc --version
          gh --version

      - name: Get account alias
        id: account-info
        run: |
          # Fetch account alias for issue title (before authentication)
          ACCOUNT_ALIAS=$(aws iam list-account-aliases --region us-west-2 --query 'AccountAliases[0]' --output text 2>/dev/null || echo "")
          if [ -z "$ACCOUNT_ALIAS" ] || [ "$ACCOUNT_ALIAS" = "None" ]; then
            ACCOUNT_ALIAS="Account-${{ matrix.account_id }}"
          fi
          echo "alias=$ACCOUNT_ALIAS" >> $GITHUB_OUTPUT
          echo "Account alias: $ACCOUNT_ALIAS"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-actions-claude-review
          aws-region: us-west-2
          role-session-name: github-actions-aws-audit-${{ matrix.account_id }}

      - name: Verify AWS access
        run: |
          echo "Testing AWS CLI access..."
          aws sts get-caller-identity --region us-west-2
          echo "✅ AWS authentication successful"

      - name: Run AWS Comprehensive Audit via Claude Code
        id: comprehensive-audit
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: false  # No PR to comment on
          prompt: |
            You are running an automated AWS infrastructure audit for account ${{ matrix.account_id }}.

            The audit skills are checked out in .claude/skills/ and available via the Skill tool.

            Execute all 4 audit skills and write their output to /tmp/ files:

            1. Invoke the skill "aws-cost-review" (use Skill tool)
               Write output to /tmp/cost-review.txt

            2. Invoke the skill "aws-credentials-audit"
               Write output to /tmp/credentials-audit.txt

            3. Invoke the skill "aws-architecture-review"
               Write output to /tmp/architecture-review.txt

            4. Invoke the skill "aws-reserved-capacity"
               Write output to /tmp/reserved-capacity.txt

            Important:
            - Use the Skill tool to invoke each audit (NOT bash execution)
            - Capture the full structured output from each skill
            - Write complete reports to the /tmp/ files for consolidation
            - If a skill encounters AccessDenied, note it but continue with others
            - Each file should contain the formatted audit report from that skill

            After all skills complete, confirm in your final message which audits
            succeeded and which (if any) had issues.
          claude_args: >-
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 50
            --allowedTools "Skill,Read,Write,Bash"

      - name: Consolidate findings
        run: |
          echo "Consolidating audit findings for account ${{ matrix.account_id }}..."
          bash scripts/consolidate-audit-findings.sh
        env:
          AWS_ACCOUNT_ID: ${{ matrix.account_id }}
          AWS_ACCOUNT_ALIAS: ${{ steps.account-info.outputs.alias }}
          COST_STATUS: ${{ steps.cost-review.outputs.status }}
          CREDS_STATUS: ${{ steps.credentials-audit.outputs.status }}
          ARCH_STATUS: ${{ steps.architecture-review.outputs.status }}
          RI_STATUS: ${{ steps.reserved-capacity.outputs.status }}

      - name: Create GitHub Issue
        run: |
          ACCOUNT_ALIAS="${{ steps.account-info.outputs.alias }}"
          ACCOUNT_ID="${{ matrix.account_id }}"
          ISSUE_TITLE="AWS Audit: $ACCOUNT_ALIAS ($ACCOUNT_ID) — $(date -u +%Y-%m-%d)"

          gh issue create \
            --repo "$GITHUB_AUDIT_REPO" \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/consolidated-audit-report.md \
            --label "aws-audit,monthly-review,automated" \
            --label "account:$ACCOUNT_ID"

          ISSUE_URL=$(gh issue list --repo "$GITHUB_AUDIT_REPO" --limit 1 --label "aws-audit" --label "account:$ACCOUNT_ID" --json url --jq '.[0].url')

          echo "✅ AWS Audit complete for $ACCOUNT_ALIAS"
          echo "📋 GitHub Issue: $ISSUE_URL"
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
        id: create-issue

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: aws-audit-results-${{ matrix.account_id }}-${{ github.run_number }}
          path: /tmp/*-review.txt
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::AWS Comprehensive Audit failed. Check logs for details."
          # Optional: Add Slack/email notification here

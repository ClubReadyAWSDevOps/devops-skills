name: Monthly AWS Audit

on:
  schedule:
    # Run on 1st of every month at 9 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      account_ids:
        description: 'Comma-separated AWS Account IDs to audit (defaults to secrets.AWS_ACCOUNT_IDS)'
        required: false
        type: string

permissions:
  id-token: write  # Required for OIDC
  contents: read
  issues: write    # Create GitHub issue with findings

jobs:
  prepare-accounts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare account matrix
        id: set-matrix
        run: |
          # Get account IDs from input or variable
          ACCOUNT_IDS="${{ inputs.account_ids || vars.AWS_ACCOUNT_IDS }}"

          # Convert comma-separated string to JSON array
          # Example: "123456789012,234567890123" -> ["123456789012","234567890123"]
          MATRIX=$(echo "$ACCOUNT_IDS" | jq -R -c 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$";""))')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Will audit accounts: $MATRIX"

  comprehensive-audit:
    needs: prepare-accounts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        account_id: ${{ fromJson(needs.prepare-accounts.outputs.matrix) }}
      fail-fast: false  # Continue auditing other accounts even if one fails
    env:
      AWS_REGION: us-west-2
      AWS_ACCOUNT_ID: ${{ matrix.account_id }}
      GITHUB_AUDIT_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq bc

          # Verify installations
          aws --version
          jq --version
          bc --version
          gh --version

      - name: Get account alias
        id: account-info
        run: |
          # Fetch account alias for issue title (before authentication)
          ACCOUNT_ALIAS=$(aws iam list-account-aliases --region us-west-2 --query 'AccountAliases[0]' --output text 2>/dev/null || echo "")
          if [ -z "$ACCOUNT_ALIAS" ] || [ "$ACCOUNT_ALIAS" = "None" ]; then
            ACCOUNT_ALIAS="Account-${{ matrix.account_id }}"
          fi
          echo "alias=$ACCOUNT_ALIAS" >> $GITHUB_OUTPUT
          echo "Account alias: $ACCOUNT_ALIAS"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-actions-claude-review
          aws-region: us-west-2
          role-session-name: github-actions-aws-audit-${{ matrix.account_id }}

      - name: Verify AWS access
        run: |
          echo "Testing AWS CLI access..."
          aws sts get-caller-identity --region us-west-2
          echo "✅ AWS authentication successful"

      - name: Run AWS Comprehensive Audit via Claude Code
        id: comprehensive-audit
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_ACCOUNT_ID: ${{ matrix.account_id }}
          AWS_ACCOUNT_ALIAS: ${{ steps.account-info.outputs.alias }}
        with:
          github_token: ${{ github.token }}
          use_bedrock: "true"
          track_progress: false # No PR to comment on — this is a scheduled audit
          prompt: |
            You are running the automated monthly AWS infrastructure audit for
            account ${{ matrix.account_id }} (alias: ${{ steps.account-info.outputs.alias }}).

            Invoke the project's own audit machinery — do NOT invent your own checklist.
            The skill is checked out in .claude/skills/aws-comprehensive-audit/ and the four
            sub-audit skills it orchestrates are available via the Skill tool.

            Steps:
            1. Invoke the skill "aws-comprehensive-audit" via the Skill tool. It runs all four
               sub-audits (cost, credentials, architecture, reserved-capacity), synthesizes the
               findings into a prioritized report (P0–P3 with calculated cost/waste/savings
               metrics and an architecture score), and creates the GitHub issue.
            2. CRITICAL — multi-account uniqueness: this workflow runs once per account in a
               matrix. Override the skill's default date-only issue title so each account gets a
               distinct issue. Use exactly this title:
                 "AWS Audit: ${{ steps.account-info.outputs.alias }} (${{ matrix.account_id }}) — <UTC date YYYY-MM-DD>"
               and create it against repo ${{ github.repository }} with labels
               "aws-audit", "monthly-review", "automated", and "account:${{ matrix.account_id }}".
            3. All AWS data is for account ${{ matrix.account_id }} only — every aws CLI call
               must pass --region us-west-2. Never query or reference any other account.
            4. If a sub-audit hits AccessDenied, note the missing permission in the report and
               continue with the others — partial results are better than none.

            Finish by printing the created issue URL in your final message.
          claude_args: >-
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 50
            --allowedTools "Skill,Task,Agent,Read,Write,Glob,Grep,Bash"

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aws-audit-transcript-${{ matrix.account_id }}-${{ github.run_number }}
          path: ${{ steps.comprehensive-audit.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::AWS Comprehensive Audit failed for account ${{ matrix.account_id }}. Check logs and transcript artifact."
